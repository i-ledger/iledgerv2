<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Sandi - R22 NPSO</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/pink-theme.css"> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="icon" href="r22.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="r22.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="r22.png" type="image/png">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="r22.png" type="image/png">
<link rel="manifest" href="manifest.json">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
    
    <div class="glass-card w-full max-w-sm p-8 shadow-2xl border-t-4" style="border-top-color: var(--primary);">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Buat Sandi Baru</h2>
            <p class="text-gray-500 text-xs mt-1">Masukkan sandi baru untuk akun Anda</p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Sandi Baru</label>
                <div class="relative">
                    <input type="password" id="newPassword" class="input-elegant w-full pr-10" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword('newPassword', 'iconNew')" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-black transition outline-none">
                        <svg id="iconNew" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Konfirmasi Sandi</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" class="input-elegant w-full pr-10" placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword('confirmPassword', 'iconConfirm')" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-black transition outline-none">
                        <svg id="iconConfirm" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnReset" class="btn-primary-pink w-full mt-4 shadow-lg uppercase tracking-wider text-sm">Update Sandi</button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-xs font-bold text-gray-600 hover:text-black transition underline">Kembali ke Login</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Fitur Toggle Show/Hide Password
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                // Ganti icon ke mata dicoret (Eye Slash)
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                input.type = 'password';
                // Ganti icon kembali ke mata normal (Eye)
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        // Eksekusi Reset Password
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass !== confirm) {
                return Swal.fire({ 
                    icon: 'error', 
                    title: 'Oops', 
                    text: 'Konfirmasi sandi tidak cocok!',
                    confirmButtonColor: '#000'
                });
            }
            if (pass.length < 6) {
                return Swal.fire({ 
                    icon: 'warning', 
                    title: 'Perhatian', 
                    text: 'Kata sandi minimal 6 karakter.',
                    confirmButtonColor: '#000'
                });
            }
            if (!token) {
                return Swal.fire({ 
                    icon: 'error', 
                    title: 'Error', 
                    text: 'Token tidak valid. Minta link reset baru dari email.',
                    confirmButtonColor: '#000'
                });
            }

            // Memanggil API reset sandi
            await API.resetPassword(token, pass);
        });
    </script>
</body>
</html>
