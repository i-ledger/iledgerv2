    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>AOS.init({ once: true });</script>
    <script src="js/api.js"></script>
    <script src="js/approval.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Setup identitas di Sidebar / Header
            const user = JSON.parse(localStorage.getItem('r22_user'));
            if(user) {
                document.getElementById('userName').textContent = user.nama;
                document.getElementById('userRole').textContent = user.role;
                if(document.getElementById('companyName')) {
                    document.getElementById('companyName').textContent = user.perusahaan || "PT. SINARAPI JATAYU PERMAI";
                }
            }

            // TRIGGER AGAR DATA ANTREAN MUNCUL SAAT HALAMAN DIBUKA
            if (typeof loadPendingUsers === 'function') {
                loadPendingUsers();
            } else {
                console.error("Fungsi loadPendingUsers tidak ditemukan di js/approval.js");
            }

            // Cek notifikasi antrean untuk lencana badge merah
            try {
                const pending = await API.request('users/pending');
                if (pending && pending.length > 0) {
                    const badge = document.getElementById('notifBadge');
                    if(badge) badge.classList.remove('hidden');
                }
            } catch (e) {
                console.log("Gagal cek notifikasi");
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const btnHamburger = document.getElementById('btnHamburger');
            const btnActionMenu = document.getElementById('btnActionMenu');
            const actionContainer = document.getElementById('actionContainer');

            function toggleSidebar() {
                sidebar.classList.toggle('-translate-x-full');
                if (sidebarOverlay.classList.contains('hidden')) {
                    sidebarOverlay.classList.remove('hidden');
                    setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
                } else {
                    sidebarOverlay.classList.add('opacity-0');
                    setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
                }
            }
            btnHamburger.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);

            btnActionMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                actionContainer.classList.toggle('hidden');
                actionContainer.classList.toggle('flex');
            });

            document.addEventListener('click', (e) => {
                if (window.innerWidth < 1024) {
                    if (!btnActionMenu.contains(e.target) && !actionContainer.contains(e.target)) {
                        if (!actionContainer.classList.contains('hidden')) {
                            actionContainer.classList.add('hidden');
                            actionContainer.classList.remove('flex');
                        }
                    }
                }
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth >= 1024) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebarOverlay.classList.add('hidden');
                    sidebarOverlay.classList.add('opacity-0');
                    actionContainer.classList.remove('hidden');
                    actionContainer.classList.add('flex');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    actionContainer.classList.add('hidden');
                    actionContainer.classList.remove('flex');
                }
            });
        });
    </script>
