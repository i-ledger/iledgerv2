<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D47A1">
<title>iLedgerV2 – Jurnal Pendapatan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ================= TEMA DASAR DARI iLedgerV2 ================= */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#0D47A1;--primary-light:#1565C0;--primary-dark:#0a3880;
  --accent:#00BCD4;--accent-light:#4DD0E1;
  --white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;
  --gray-200:#e2e8f0;--gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;
  --success:#10b981;--error:#ef4444;--warning:#f59e0b;
  --shadow-sm:0 1px 3px rgba(0,0,0,.12);
  --shadow-md:0 4px 24px rgba(13,71,161,.15);
  --shadow-lg:0 20px 60px rgba(13,71,161,.2);
  --radius:12px;--radius-lg:20px;
  --font:'Plus Jakarta Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body{
  font-family:var(--font);
  background:linear-gradient(135deg,#0D47A1 0%,#1565C0 40%,#0288D1 100%);
  color: var(--gray-800);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

/* Floating geometric shapes (Dipertahankan) */
.bg-shape{position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:.08}
.bg-shape-1{width:500px;height:500px;background:white;top:-200px;right:-150px;animation:float1 8s ease-in-out infinite}
.bg-shape-2{width:300px;height:300px;background:white;bottom:-100px;left:-100px;animation:float2 10s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(30px) scale(1.05)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}

/* ================= ADAPTASI DASHBOARD ================= */
.dashboard-wrapper {
  display: flex;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* Sidebar Glassmorphism */
.sidebar {
  width: 280px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(255,255,255,0.3);
  position: fixed;
  height: 100vh;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  z-index: 50;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 24px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
}
.sidebar-profile { padding: 24px; border-bottom: 1px solid var(--gray-200); }
.initial-circle {
  width: 48px; height: 48px;
  background: var(--accent); color: white;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: bold; margin-bottom: 12px;
}
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40;
  opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.sidebar-overlay.active { opacity: 1; visibility: visible; }

/* Main Content Area */
.main-content {
  flex: 1;
  margin-left: 280px;
  padding: 32px;
  transition: margin 0.3s ease;
}

/* Glass Card (Adaptasi dari login-card) */
.glass-card {
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.3);
  padding: 32px;
  margin-bottom: 24px;
  animation: slideUp .6s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Header & Typography */
.card-title {
  font-size: 20px; font-weight: 800; color: var(--primary-dark);
  margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;
}
.stat-box {
  background: var(--gray-50); border: 1px solid var(--gray-200);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.stat-value { font-size: 28px; font-weight: 800; color: var(--success); font-family: var(--font-mono); }
.stat-label { font-size: 13px; color: var(--gray-600); font-weight: 600; margin-top: 4px; }

/* Komponen Form dari iLedgerV2 */
.form-group{margin-bottom:20px;}
.form-label{
  display:block;font-size:13px;font-weight:600;
  color:var(--gray-600);margin-bottom:8px;letter-spacing:.2px;
}
.form-control{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:var(--font);font-size:14px;color:var(--gray-800);
  background:var(--gray-50);transition:all .2s ease;outline:none;
}
.form-control:focus{
  border-color:var(--primary);background:white;
  box-shadow:0 0 0 3px rgba(13,71,161,.1);
}

.btn-primary{
  padding:14px 24px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
  color:white;border:none;border-radius:var(--radius);
  font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .25s ease;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(13,71,161,.4)}
.btn-outline {
  padding:14px 24px; background: transparent; color: var(--gray-600);
  border: 1.5px solid var(--gray-300); border-radius: var(--radius);
  font-weight: 700; cursor: pointer; transition: 0.2s;
}
.btn-outline:hover { background: var(--gray-100); }

/* Table Styling */
.table-responsive { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--gray-200); }
table { width: 100%; border-collapse: collapse; text-align: left; }
thead th { background: var(--gray-50); padding: 14px 16px; font-size: 13px; font-weight: 700; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); }
tbody td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--gray-100); }
tbody tr:hover { background: var(--gray-50); }
.action-btn { background: none; border: none; cursor: pointer; color: var(--gray-400); transition: 0.2s; padding: 4px; }
.action-btn:hover { color: var(--primary); }
.action-btn.delete:hover { color: var(--error); }

/* Responsive Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* Mobile Menu Button */
.hamburger {
  display: none; background: rgba(255,255,255,0.2); border: none; padding: 8px; border-radius: 8px; cursor: pointer; color: white;
}

@media(max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.show { transform: translateX(0); }
  .main-content { margin-left: 0; padding: 20px; }
  .hamburger { display: block; margin-bottom: 20px; }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<div class="dashboard-wrapper">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 style="font-weight: 800; font-size: 22px;">iLedgerV2</h2>
      <p style="font-size: 12px; opacity: 0.8;">Enterprise Edition</p>
    </div>
    <div class="sidebar-profile">
      <div class="initial-circle" id="userInitial">U</div>
      <h3 style="font-size: 16px; font-weight: 700;" id="userName">Memuat...</h3>
      <p style="font-size: 13px; color: var(--gray-400);" id="userRole">Admin Finance</p>
      <p style="font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 8px;" id="companyName">PT. INDO LEDGER</p>
    </div>
    <div style="padding: 24px;">
      <a href="#" style="display: block; padding: 12px; background: var(--gray-50); border-radius: var(--radius); text-decoration: none; color: var(--primary-dark); font-weight: 600; margin-bottom: 8px;">Jurnal Pendapatan</a>
    </div>
  </nav>

  <main class="main-content">
    <button class="hamburger" id="btnHamburger">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>

    <div class="glass-card" style="animation-delay: 0.1s;">
      <h2 class="card-title">
        <span id="incomeLabel">Total Pendapatan (Semua)</span>
        <span style="font-size: 14px; background: var(--primary-light); color: white; padding: 4px 12px; border-radius: 20px;" id="totalEntries">0 Entri</span>
      </h2>
      <div class="stat-box">
        <div class="stat-value" id="incomeMonth">Rp 0</div>
        <div class="stat-label">Total Akumulasi Terfilter</div>
      </div>
    </div>

    <div class="glass-card" id="formContainer" style="animation-delay: 0.2s;">
      <h2 class="card-title" id="formTitle">Catat Pendapatan Baru</h2>
      <form id="formPendapatan">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="nama">Nama Transaksi / Klien</label>
            <input type="text" id="nama" class="form-control" placeholder="Contoh: Invoice PT Alpha" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="nominal">Nominal (Rp)</label>
            <input type="number" id="nominal" class="form-control" placeholder="Contoh: 5000000" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="uraian">Uraian / Keterangan</label>
          <input type="text" id="uraian" class="form-control" placeholder="Detail pembayaran..." required>
        </div>

        <div class="form-group">
          <label class="form-label" for="buktiTransfer">Upload Bukti Transfer (Opsional)</label>
          <input type="file" id="buktiTransfer" class="form-control" accept="image/*,application/pdf">
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button type="submit" class="btn-primary" id="btnSubmit">Simpan Data Jurnal</button>
          <button type="button" class="btn-outline hidden" id="btnBatal" style="display: none;">Batal Ubah</button>
        </div>
      </form>
    </div>

    <div class="glass-card" style="animation-delay: 0.3s;">
      <div class="card-title">
        Riwayat Transaksi
        <select id="filterBulan" class="form-control" style="width: 200px; padding: 8px 12px; font-size: 13px;">
          <option value="all">Memuat Filter...</option>
        </select>
      </div>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Waktu Transaksi</th>
              <th>Nama Klien</th>
              <th>Uraian</th>
              <th style="text-align: right;">Nominal</th>
              <th style="text-align: center;">Bukti</th>
              <th style="text-align: center;">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelBody">
            <tr>
              <td colspan="7" style="text-align: center; color: var(--gray-400);">Data sedang dimuat...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  // Script khusus menyesuaikan tampilan Sidebar Button dan Tombol Batal
  document.getElementById('btnHamburger').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('show');
    document.getElementById('sidebarOverlay').classList.add('active');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('show');
    document.getElementById('sidebarOverlay').classList.remove('active');
  });
  
  // Logic untuk Toggle Show/Hide Tombol Batal sesuai class CSS theme ini
  const originalEditData = window.editData;
  const originalResetForm = window.resetFormMode;
  
  // Karena struktur inline "hidden" diganti inline "display:none" untuk btn-outline
  document.getElementById('btnBatal').addEventListener('click', () => {
    document.getElementById('btnBatal').style.display = 'none';
    document.getElementById('btnSubmit').innerText = 'Simpan Data Jurnal';
    // Panggil reset dari file JS mu nanti
  });
</script>

</body>
</html>
