<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - R22 NPSO</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Frameworks & Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/pink-theme.css">
    
    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Assets -->
    <link rel="icon" href="r22.png" type="image/png">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFBFC; /* Blush White */
            color: #2A1F22;
            -webkit-font-smoothing: antialiased;
        }

        /* Input styling yang sejalan dengan tema baru */
        .input-elegant {
            appearance: none;
            width: 100%;
            background-color: #FFFBFC;
            border: 1px solid #FBEAEC;
            color: #2A1F22;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .input-elegant:focus {
            outline: none;
            border-color: #FDA4AF;
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
            background-color: #FFFFFF;
        }
        .input-elegant::placeholder {
            color: #BDAEAF;
        }
        
        select.input-elegant {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23887A7D' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-10 relative overflow-hidden">
    
    <!-- Background Decorative Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-pink-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-rose-200/40 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>

    <div class="w-full max-w-lg bg-white rounded-3xl p-8 lg:p-10 shadow-[0_8px_32px_rgba(225,29,72,0.06)] border border-[#FBEAEC] relative z-10 transition-all" data-aos="fade-up" data-aos-duration="800">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-600 mb-2">
                Buat Akun R22
            </h1>
            <p class="text-sm font-medium text-[#887A7D]">Lengkapi data di bawah untuk bergabung</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <!-- Nama Pangkalan Tujuan (Highlighted) -->
            <div class="bg-rose-50/50 p-4 rounded-xl border border-rose-100/50">
                <label class="block text-xs font-bold text-rose-700 uppercase tracking-wider mb-2">Nama Pangkalan Tujuan</label>
                <input type="text" id="regPerusahaan" class="input-elegant !bg-white !border-rose-200 focus:!border-rose-400 font-bold text-rose-900" placeholder="Masukkan nama pangkalan" required>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-bold text-[#2A1F22] mb-2">Nama Lengkap</label>
                    <input type="text" id="regNama" class="input-elegant" placeholder="Nama Anda" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#2A1F22] mb-2">No. HP / WhatsApp</label>
                    <input type="tel" id="regHp" class="input-elegant" placeholder="08xxx" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-[#2A1F22] mb-2">Alamat Email</label>
                <input type="email" id="regEmail" class="input-elegant" placeholder="nama@email.com" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-[#2A1F22] mb-2">Kata Sandi</label>
                <input type="password" id="regPassword" class="input-elegant" placeholder="Buat kata sandi yang kuat" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-[#2A1F22] mb-2">Alamat Lengkap</label>
                <textarea id="regAlamat" class="input-elegant resize-none" rows="2" placeholder="Masukkan alamat lengkap Anda" required></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-[#2A1F22] mb-2">Pilih Peran (Role)</label>
                <select id="regRole" class="input-elegant cursor-pointer" required>
                    <option value="" disabled selected>Pilih akses Anda...</option>
                    <option value="DRIVER">Driver</option>
                    <option value="CUSTOMER">Customer</option>
                </select>
            </div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
    <div>
        <label class="block text-sm font-bold text-[#2A1F22] mb-2">Latitude (Opsional)</label>
        <input type="text" id="regLat" class="input-elegant" placeholder="Contoh: -6.9174">
    </div>
    <div>
        <label class="block text-sm font-bold text-[#2A1F22] mb-2">Longitude (Opsional)</label>
        <input type="text" id="regLng" class="input-elegant" placeholder="Contoh: 107.6191">
    </div>
</div>
            <button type="submit" id="btnRegister" class="w-full bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 text-white text-sm font-bold px-6 py-3.5 rounded-xl shadow-md shadow-rose-200 transition-all flex items-center justify-center gap-2 mt-4">
                Daftar Akun Sekarang
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <p class="mt-8 text-center text-sm font-medium text-[#887A7D]">
            Sudah memiliki akun? 
            <a href="index.html" class="text-rose-500 font-bold hover:text-rose-700 hover:underline transition-colors">Masuk di sini</a>
        </p>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>AOS.init({ once: true });</script>
    <script src="js/api.js"></script>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const btn = document.getElementById('btnRegister'); 
            
            // Simpan teks asli tombol
            const originalText = btn.innerHTML;
            
            // State loading
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses...`;
            
            try { 
                await API.request('register', { 
                    namaPerusahaan: document.getElementById('regPerusahaan').value, 
                    nama: document.getElementById('regNama').value, 
                    email: document.getElementById('regEmail').value, 
                    password: document.getElementById('regPassword').value, 
                    noHP: document.getElementById('regHp').value, 
                    alamat: document.getElementById('regAlamat').value, 
                    role: document.getElementById('regRole').value,
                    latitude: document.getElementById('regLat').value.trim() || "-",
                    longitude: document.getElementById('regLng').value.trim() || "-",
                    tenantId: "" 
                }); 
                
                Swal.fire({
                    icon: 'success', 
                    title: 'Berhasil Terdaftar!', 
                    text: 'Akun Anda sedang menunggu Approval dari Admin.',
                    confirmButtonColor: '#E11D48',
                    background: '#FFFBFC',
                    color: '#2A1F22'
                }).then(() => window.location.href = 'index.html'); 
                
            } catch (err) { 
                btn.disabled = false; 
                btn.innerHTML = originalText;
                
                Swal.fire({
                    icon: 'error',
                    title: 'Pendaftaran Gagal',
                    text: 'Silakan periksa kembali data Anda.',
                    confirmButtonColor: '#E11D48',
                    background: '#FFFBFC',
                    color: '#2A1F22'
                });
            }
        });
    </script>
</body>
</html>
